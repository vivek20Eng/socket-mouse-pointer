services:
  - type: web
    name: socket-mouse-pointer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: CORS_ORIGIN
        value: "https://socket-mouse-pointer.vercel.app,https://socket-mouse-pointer-cbvs.vercel.app,http://localhost:3000"
